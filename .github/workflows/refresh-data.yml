name: Refresh client data

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      client:
        description: "Client slug (e.g. ideogram). Leave blank to refresh all."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Refresh client(s)
        env:
          CLIENT_INPUT: ${{ github.event.inputs.client }}
        run: |
          set -e
          if [ -n "$CLIENT_INPUT" ]; then
            node scripts/fetch-sheet.mjs "$CLIENT_INPUT"
          else
            for f in clients/*.json; do
              slug=$(basename "$f" .json)
              node scripts/fetch-sheet.mjs "$slug"
            done
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
