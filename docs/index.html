<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f7f7f5;
  --bg-tertiary: #f0efec;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #9a9a9a;
  --border: rgba(0, 0, 0, 0.1);
  --border-hover: rgba(0, 0, 0, 0.2);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #242422;
    --bg-tertiary: #2c2c2a;
    --text-primary: #e8e8e4;
    --text-secondary: #9a9a96;
    --text-tertiary: #6b6b68;
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(255, 255, 255, 0.15);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 96px 24px 80px;
}
.kicker {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}
h1 {
  font-size: 38px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.sub {
  font-size: 17px;
  color: var(--text-secondary);
  margin-bottom: 48px;
  max-width: 560px;
}
.clients { display: grid; gap: 10px; }
.client-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border: 0.5px solid var(--border);
  border-radius: 14px;
  background: var(--bg-primary);
  text-decoration: none;
  color: var(--text-primary);
  transition: border-color 0.15s ease, background 0.15s ease;
}
.client-card:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
.client-card h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.1px;
}
.client-card p {
  font-size: 13px;
  color: var(--text-secondary);
}
.client-card .arrow {
  font-family: 'DM Mono', monospace;
  color: var(--text-tertiary);
  font-size: 14px;
}
</style>
</head>
<body>
<main class="container">
  <span class="kicker">Dashboard Site · Growth Marketing Pro</span>
  <h1>Client Strategy Microsites</h1>
  <p class="sub">Live, auto-refreshing strategy microsites rendered from Google Sheets. Each link opens the latest version of a client's plan.</p>
  <div class="clients">
    <a class="client-card" href="./ideogram/">
      <div>
        <h2>Ideogram.AI</h2>
        <p>3-Month SEO/GEO Roadmap · April 2026</p>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</main>
</body>
</html>
